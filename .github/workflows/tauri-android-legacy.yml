name: Tauri Android Legacy Release

# 老设备(安卓 8.1 / Chromium 61)专用 legacy APK。手动触发为主;
# 打 legacy tag(v*-legacy)时也会跑。独立 identifier com.wh0am1i.fmodeck.legacy。
on:
  push:
    tags:
      - 'v*-legacy'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-legacy:
    runs-on: ubuntu-latest
    env:
      VITE_UPDATE_BASE_URL: ${{ secrets.VITE_UPDATE_BASE_URL }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      LEGACY_CONF: src-tauri/tauri.legacy.conf.json
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust + ARM Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Extract changelog from README
        id: changelog
        shell: bash
        run: ./scripts/extract-changelog.sh

      # 用 legacy 配置 init,脚手架 applicationId 才会是 .legacy
      - name: Init Tauri Android scaffold (legacy)
        run: pnpm tauri android init -c "$LEGACY_CONF"

      - name: Restore release keystore
        run: ./scripts/android-signing-setup.sh

      - name: Inject gradle signingConfig
        run: ./scripts/android-signing-inject.sh

      # FMO 设备走 ws://fmo.local 明文连接,Android 9+ 默认拦截,
      # 必须在 <application> 上强制 usesCleartextTraffic="true"。
      - name: Allow cleartext traffic for ws://fmo.local
        shell: bash
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import re, sys
          p = sys.argv[1]
          s = open(p).read()
          if 'usesCleartextTraffic' in s:
              s = re.sub(
                  r'android:usesCleartextTraffic="[^"]*"',
                  'android:usesCleartextTraffic="true"',
                  s,
              )
          else:
              s = re.sub(
                  r'(<application\b)',
                  r'\1 android:usesCleartextTraffic="true"',
                  s,
                  count=1,
              )
          open(p, 'w').write(s)
          print("✓ usesCleartextTraffic forced to true")
          PY
          cat "$MANIFEST"

      - name: Patch AndroidManifest (REQUEST_INSTALL_PACKAGES + FileProvider)
        run: ./scripts/android-manifest-patch.sh

      # 去掉 enableEdgeToEdge + 加 setDecorFitsSystemWindows,避免 WebView 内容与状态栏重叠
      - name: Replace MainActivity to disable edge-to-edge
        shell: bash
        run: |
          MAIN_ACTIVITY=$(find src-tauri/gen/android/app/src/main/java -name MainActivity.kt | head -1)
          if [ -z "$MAIN_ACTIVITY" ]; then
            echo "::error::MainActivity.kt not found"
            find src-tauri/gen/android -type f -name '*.kt' | head -20
            exit 1
          fi
          PKG=$(head -1 "$MAIN_ACTIVITY" | awk '{print $2}')
          echo "Package: $PKG"
          sed "s/%PKG%/${PKG}/" scripts/android-main-activity.kt.tpl > "$MAIN_ACTIVITY"
          cat "$MAIN_ACTIVITY"

      - name: Verify Android patches applied
        shell: bash
        run: |
          MAIN_ACTIVITY=$(find src-tauri/gen/android/app/src/main/java -name MainActivity.kt | head -1)
          if grep -qE '^[[:space:]]*enableEdgeToEdge[[:space:]]*\(' "$MAIN_ACTIVITY"; then
            echo "::error::MainActivity.kt still calls enableEdgeToEdge()"
            exit 1
          fi
          if ! grep -q 'setOnApplyWindowInsetsListener' "$MAIN_ACTIVITY"; then
            echo "::error::MainActivity.kt missing setOnApplyWindowInsetsListener"
            exit 1
          fi
          if ! grep -q 'fun installApk' "$MAIN_ACTIVITY"; then
            echo "::error::MainActivity.kt missing installApk companion method"
            exit 1
          fi
          echo "✓ Android MainActivity patches verified"

      # 用 legacy 配置 build:beforeBuildCommand 会跑 pnpm build:legacy 产 dist-legacy,
      # frontendDist 指向 dist-legacy,applicationId 为 .legacy
      - name: Build Android APK (legacy, release signed, arm64 + armv7)
        run: pnpm tauri android build -c "$LEGACY_CONF" --apk --target aarch64 --target armv7

      - name: Locate and rename APK
        shell: bash
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' -print | head -1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found under src-tauri/gen/android"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi
          echo "Found APK at: $APK"
          VERSION=$(node -p "require('./src-tauri/tauri.legacy.conf.json').version")
          cp "$APK" "FmoDeck-Legacy_${VERSION}_android.apk"
          ls -lh FmoDeck-Legacy_*_android.apk

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FmoDeck ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: |
            FmoDeck-Legacy_*_android.apk

      - name: Upload APK as artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: FmoDeck-android-legacy-apk
          path: |
            FmoDeck-Legacy_*_android.apk
