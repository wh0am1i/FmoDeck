name: Tauri Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      VITE_AMAP_KEY: ${{ secrets.AMAP_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      # arm64 覆盖 2018 年后的设备，armv7 兜底更老机型；x86_64 / i686
      # 只有模拟器用得到，跳过以控制 debug APK 体积
      - name: Install Rust + ARM Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Extract changelog from README
        id: changelog
        shell: bash
        run: ./scripts/extract-changelog.sh

      # 每次 CI 都重新 init Android 脚手架，repo 里不落 src-tauri/gen/
      - name: Init Tauri Android scaffold
        run: pnpm tauri android init

      # FMO 设备走 ws://fmo.local 明文连接，Android 9+ 默认拦截，
      # 必须在 <application> 上加 usesCleartextTraffic="true"
      - name: Allow cleartext traffic for ws://fmo.local
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's|<application |<application android:usesCleartextTraffic="true" |' "$MANIFEST"
          fi
          cat "$MANIFEST"

      # --debug 让 Gradle 用自动 debug keystore 出可安装 APK（省签名流程）；
      # 只打 arm64 + armv7 两个 ABI，覆盖新老设备，跳过模拟器专用的 x86
      - name: Build Android APK (debug signed, arm64 + armv7)
        run: pnpm tauri android build --apk --debug --target aarch64 --target armv7

      - name: Locate and rename APK
        shell: bash
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' -print | head -1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found under src-tauri/gen/android"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "FmoDeck_${GITHUB_REF_NAME#v}_android.apk"
          ls -lh FmoDeck_*_android.apk

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FmoDeck ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: FmoDeck_*_android.apk

      # workflow_dispatch 时没 tag，改成上传为 artifact 方便直接下载
      - name: Upload APK as artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: FmoDeck-android-apk
          path: FmoDeck_*_android.apk
