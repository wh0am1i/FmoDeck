name: Tauri Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      VITE_UPDATE_BASE_URL: ${{ secrets.VITE_UPDATE_BASE_URL }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      # arm64 覆盖 2018 年后的设备，armv7 兜底更老机型；x86_64 / i686
      # 只有模拟器用得到，跳过以控制 debug APK 体积
      - name: Install Rust + ARM Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Extract changelog from README
        id: changelog
        shell: bash
        run: ./scripts/extract-changelog.sh

      # 每次 CI 都重新 init Android 脚手架，repo 里不落 src-tauri/gen/
      - name: Init Tauri Android scaffold
        run: pnpm tauri android init

      - name: Restore release keystore
        run: ./scripts/android-signing-setup.sh

      - name: Inject gradle signingConfig
        run: ./scripts/android-signing-inject.sh

      # FMO 设备走 ws://fmo.local 明文连接，Android 9+ 默认拦截，
      # 必须在 <application> 上强制 usesCleartextTraffic="true"。
      # Tauri 2.10+ 生成的 manifest 自带 usesCleartextTraffic="false"，
      # 所以不能"没找到才加"——要无条件覆盖。
      - name: Allow cleartext traffic for ws://fmo.local
        shell: bash
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import re, sys
          p = sys.argv[1]
          s = open(p).read()
          if 'usesCleartextTraffic' in s:
              s = re.sub(
                  r'android:usesCleartextTraffic="[^"]*"',
                  'android:usesCleartextTraffic="true"',
                  s,
              )
          else:
              s = re.sub(
                  r'(<application\b)',
                  r'\1 android:usesCleartextTraffic="true"',
                  s,
                  count=1,
              )
          open(p, 'w').write(s)
          print("✓ usesCleartextTraffic forced to true")
          PY
          cat "$MANIFEST"

      - name: Patch AndroidManifest (REQUEST_INSTALL_PACKAGES + FileProvider)
        run: ./scripts/android-manifest-patch.sh

      # Tauri 2 默认生成的 MainActivity.kt 调 enableEdgeToEdge() 把 app
      # 切到边到边模式（WebView 画到状态栏下方 → 内容和状态栏重叠）。
      # 用模板替换掉，去掉 enableEdgeToEdge + 加 setDecorFitsSystemWindows
      - name: Replace MainActivity to disable edge-to-edge
        shell: bash
        run: |
          MAIN_ACTIVITY=$(find src-tauri/gen/android/app/src/main/java -name MainActivity.kt | head -1)
          if [ -z "$MAIN_ACTIVITY" ]; then
            echo "::error::MainActivity.kt not found"
            find src-tauri/gen/android -type f -name '*.kt' | head -20
            exit 1
          fi
          echo "=== Original MainActivity.kt ==="
          cat "$MAIN_ACTIVITY"
          PKG=$(head -1 "$MAIN_ACTIVITY" | awk '{print $2}')
          echo "Package: $PKG"
          sed "s/%PKG%/${PKG}/" scripts/android-main-activity.kt.tpl > "$MAIN_ACTIVITY"
          echo "=== Modified MainActivity.kt ==="
          cat "$MAIN_ACTIVITY"

      # 验证 MainActivity patch 生效（没有实际调用 edge-to-edge 启用 +
      # 含 inset listener）。用 ^\s*pattern 匹配代码行，避开 block 注释
      - name: Verify Android patches applied
        shell: bash
        run: |
          MAIN_ACTIVITY=$(find src-tauri/gen/android/app/src/main/java -name MainActivity.kt | head -1)
          if grep -qE '^[[:space:]]*enableEdgeToEdge[[:space:]]*\(' "$MAIN_ACTIVITY"; then
            echo "::error::MainActivity.kt still calls enableEdgeToEdge()"
            exit 1
          fi
          if ! grep -q 'setOnApplyWindowInsetsListener' "$MAIN_ACTIVITY"; then
            echo "::error::MainActivity.kt missing setOnApplyWindowInsetsListener"
            exit 1
          fi
          if ! grep -q 'fun installApk' "$MAIN_ACTIVITY"; then
            echo "::error::MainActivity.kt missing installApk companion method"
            exit 1
          fi
          echo "✓ Android MainActivity patches verified"

      # keystore 在前面两步（Restore release keystore / Inject gradle signingConfig）
      # 里注入，此处直接出 release 签名 APK；只打 arm64 + armv7 两个 ABI，
      # 覆盖新老设备，跳过模拟器专用的 x86
      - name: Build Android APK (release signed, arm64 + armv7)
        run: pnpm tauri android build --apk --target aarch64 --target armv7

      - name: Locate and rename APK
        shell: bash
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' -print | head -1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found under src-tauri/gen/android"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi
          echo "Found APK at: $APK"
          # tag 推送走 tag (v0.1.6 → 0.1.6);workflow_dispatch 跑分支时
          # GITHUB_REF_NAME 含 `/`,退化读 package.json 拿版本号
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          cp "$APK" "FmoDeck_${VERSION}_android.apk"
          ls -lh FmoDeck_*_android.apk

      - name: Build latest.json
        shell: bash
        env:
          UPDATE_BASE_URL: ${{ secrets.VITE_UPDATE_BASE_URL }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          APK_PATH=$(ls FmoDeck_*_android.apk | head -1)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          APK_PATH="$APK_PATH" VERSION="$VERSION" UPDATE_BASE_URL="$UPDATE_BASE_URL" CHANGELOG_BODY="$CHANGELOG_BODY" \
            ./scripts/build-latest-json.sh

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FmoDeck ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: |
            FmoDeck_*_android.apk
            latest.json

      # workflow_dispatch 时没 tag，改成上传为 artifact 方便直接下载
      - name: Upload APK as artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: FmoDeck-android-apk
          path: |
            FmoDeck_*_android.apk
            latest.json
