name: Tauri Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 让 workflow token 能创建/更新 Release（新仓库默认是 read-only）
permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 不打 DMG —— CI 上 bundle_dmg.sh 依赖 hdiutil/osascript，
          # headless 环境易失败。改用 --bundles app，后接一步手动 zip 上传。
          # 两档都跑在 Apple Silicon runner 上；x86_64 通过交叉编译产出。
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundles: 'app'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            bundles: 'app'
          # Linux / Windows 用 tauri-action 默认全打
          - platform: 'ubuntu-latest'
            target: ''
            bundles: ''
          - platform: 'windows-latest'
            target: ''
            bundles: ''

    runs-on: ${{ matrix.platform }}
    env:
      VITE_AMAP_KEY: ${{ secrets.AMAP_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Extract changelog from README
        id: changelog
        shell: bash
        run: ./scripts/extract-changelog.sh

      # ------------- macOS 路径：手动 build + ad-hoc 签名 + ditto zip + 上传 -------------
      - name: Build (macOS, no DMG)
        if: startsWith(matrix.platform, 'macos-')
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app

      # 未签名的 app 下载后挂 quarantine 打开会报"已损坏"。ad-hoc 签名
      # （身份 "-"）是本地签名，没有开发者证书也能把签名状态从"无效"
      # 变成"有效但本地"，满足 Gatekeeper 的完整性校验；用户首次打开
      # 仍是"未知开发者"（右键 → 打开即可绕过），但不会再报"已损坏"。
      - name: Ad-hoc codesign .app
        if: startsWith(matrix.platform, 'macos-')
        run: |
          codesign --force --deep --sign - \
            "src-tauri/target/${{ matrix.target }}/release/bundle/macos/FmoDeck.app"
          codesign --verify --verbose \
            "src-tauri/target/${{ matrix.target }}/release/bundle/macos/FmoDeck.app"

      - name: Zip .app
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        run: |
          cd "src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          # 用 ditto 代替 zip：保留扩展属性和签名元数据，避免解压后签名失效
          ditto -c -k --sequesterRsrc --keepParent \
            FmoDeck.app \
            "../../../../../../FmoDeck_${GITHUB_REF_NAME#v}_${{ matrix.target }}.app.zip"

      - name: Upload macOS zip to release
        if: startsWith(matrix.platform, 'macos-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FmoDeck ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: FmoDeck_*_${{ matrix.target }}.app.zip

      # ------------- Linux / Windows：tauri-action 默认全打 -------------
      - name: Build (Linux/Windows via tauri-action)
        if: "!startsWith(matrix.platform, 'macos-')"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: FmoDeck ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
