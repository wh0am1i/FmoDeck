<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FmoDeck">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060F"/>
      <stop offset="1" stop-color="#0A1420"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- HUD 四角定位符 -->
  <g stroke="#00D9FF" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M64 112 L64 64 L112 64"/>
    <path d="M400 64 L448 64 L448 112"/>
    <path d="M448 400 L448 448 L400 448"/>
    <path d="M112 448 L64 448 L64 400"/>
  </g>
  <!-- 字母 F -->
  <g fill="#00D9FF">
    <rect x="160" y="152" width="192" height="40" rx="4"/>
    <rect x="160" y="152" width="40" height="208" rx="4"/>
    <rect x="160" y="240" width="140" height="36" rx="4"/>
  </g>
  <!-- 扫描线装饰 -->
  <g opacity="0.15" fill="#00D9FF">
    <rect x="64" y="380" width="384" height="2"/>
    <rect x="64" y="396" width="384" height="2"/>
    <rect x="64" y="412" width="384" height="2"/>
  </g>
</svg>
