# 一键构建 + 启动：docker compose up -d --build
# 停止：docker compose down
# 更新：git pull && docker compose up -d --build

services:
  fmodeck:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 高德 key：从宿主 shell / .env 变量读取（没设就空，运行时 fallback BDC）
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
      # 若需子路径部署，在 Dockerfile 顶部改 BASE_PATH，或此处 args 补充
      # args:
      #   BASE_PATH: /fmodeck/
      #   LISTEN_PORT: "80"
    image: fmodeck:latest
    container_name: fmodeck
    restart: unless-stopped
    # 只绑本地回环 → 宿主 nginx 反代；改成 "8080:80" 则对外可达
    ports:
      - '127.0.0.1:8080:80'
